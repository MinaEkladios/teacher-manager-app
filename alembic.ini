# Alembic configuration file.
#
# Generated for TeacherManager.
# Modified for async SQLAlchemy with asyncpg.

[alembic]
# Path to migration scripts
sqlalchemy.url = driver://user:password@localhost/dbname

# Template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(rev_ts)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present;
# defaults to the current directory in which the script is run
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetime.datetime.now(datetime.timezone(datetime.timedelta(0)))
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a migration file name.  The default
# value is 40 which requires assert test files not "start with character set
# greater than 40 characters.
# slug_size =

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# when set to 'true', !important to set sqlalchemy.url instead of sqlalchemy.engine.*
sqlalchemy.trackModifications = false

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
