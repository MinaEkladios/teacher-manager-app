<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TeacherManager - Classroom attendance and student management">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/static/icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.ico">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <title>{% block title %}TeacherManager{% endblock %}</title>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/" class="logo">📚 TeacherManager</a>
            </div>
            
            <ul class="navbar-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
                <li><a href="/attendance" class="nav-link">Attendance</a></li>
                <li><a href="/students" class="nav-link">Students</a></li>
                <li><a href="/classes" class="nav-link">Classes</a></li>
                <li><a href="/reports" class="nav-link">Reports</a></li>
                <li class="nav-auth">
                    <a href="/login" class="btn-primary">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 TeacherManager. All rights reserved.</p>
            <p>
                <a href="/docs" target="_blank">API Docs</a> |
                <a href="https://github.com" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>

    <!-- Service Worker Registration (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
